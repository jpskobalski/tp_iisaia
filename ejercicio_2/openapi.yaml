openapi: 3.1.0
info:
  title: CRM API
  version: 1.0.0
  description: API de gestión de clientes y contactos del CRM.

paths:
  /clientes:
    get:
      summary: Lista clientes
      description: Obtiene una lista paginada de clientes del CRM. Permite filtrar por estado.
      operationId: listarClientes
      tags:
        - Clientes
      parameters:
        - name: limit
          in: query
          required: false
          description: Cantidad máxima de clientes a devolver.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
        - name: offset
          in: query
          required: false
          description: Cantidad de registros a omitir desde el inicio de la lista.
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 0
        - name: estado
          in: query
          required: false
          description: Estado del cliente usado como filtro.
          schema:
            type: string
            enum:
              - activo
              - inactivo
              - prospecto
            example: activo
      responses:
        "200":
          description: Lista de clientes obtenida correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cliente"
              examples:
                clientes:
                  summary: Lista de clientes
                  value:
                    - id: cli_001
                      nombre: Juan Pérez
                      email: juan.perez@acme.com
                      telefono: "+5491123456789"
                      empresa: Acme S.A.
                      estado: activo
                      fechaCreacion: "2026-05-14T10:30:00Z"
                    - id: cli_002
                      nombre: María Gómez
                      email: maria.gomez@nova.com
                      telefono: "+5491198765432"
                      empresa: Nova Tech
                      estado: prospecto
                      fechaCreacion: "2026-05-13T15:45:00Z"
        "400":
          description: Parámetros de consulta inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                parametrosInvalidos:
                  summary: Parámetros inválidos
                  value:
                    codigo: PARAMETROS_INVALIDOS
                    mensaje: Uno o más parámetros de consulta no son válidos.
                    detalles:
                      - limit debe ser un entero entre 1 y 100.
        "404":
          description: No se encontraron clientes para los criterios solicitados.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                clientesNoEncontrados:
                  summary: Clientes no encontrados
                  value:
                    codigo: CLIENTES_NO_ENCONTRADOS
                    mensaje: No se encontraron clientes para los criterios indicados.
                    detalles: []

    post:
      summary: Crea un cliente
      description: Crea un nuevo cliente en el CRM.
      operationId: crearCliente
      tags:
        - Clientes
      requestBody:
        required: true
        description: Datos necesarios para crear un cliente.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClienteInput"
            examples:
              nuevoCliente:
                summary: Nuevo cliente
                value:
                  nombre: Laura Fernández
                  email: laura.fernandez@orion.com
                  telefono: "+5491155512345"
                  empresa: Orion Consulting
                  estado: prospecto
      responses:
        "201":
          description: Cliente creado correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
              examples:
                clienteCreado:
                  summary: Cliente creado
                  value:
                    id: cli_003
                    nombre: Laura Fernández
                    email: laura.fernandez@orion.com
                    telefono: "+5491155512345"
                    empresa: Orion Consulting
                    estado: prospecto
                    fechaCreacion: "2026-05-14T18:20:00Z"
        "400":
          description: Datos de entrada inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                datosInvalidos:
                  summary: Datos inválidos
                  value:
                    codigo: DATOS_INVALIDOS
                    mensaje: La solicitud contiene datos inválidos.
                    detalles:
                      - email debe tener formato de correo electrónico válido.
                      - estado debe ser uno de activo, inactivo o prospecto.
        "404":
          description: Recurso relacionado inexistente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                recursoNoEncontrado:
                  summary: Recurso no encontrado
                  value:
                    codigo: RECURSO_NO_ENCONTRADO
                    mensaje: No se encontró el recurso solicitado.
                    detalles: []

  /clientes/{clienteId}:
    get:
      summary: Obtiene un cliente
      description: Obtiene el detalle de un cliente específico por su identificador.
      operationId: obtenerCliente
      tags:
        - Clientes
      parameters:
        - name: clienteId
          in: path
          required: true
          description: Identificador único del cliente.
          schema:
            type: string
            minLength: 1
            maxLength: 64
            example: cli_001
      responses:
        "200":
          description: Cliente obtenido correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
              examples:
                cliente:
                  summary: Detalle de cliente
                  value:
                    id: cli_001
                    nombre: Juan Pérez
                    email: juan.perez@acme.com
                    telefono: "+5491123456789"
                    empresa: Acme S.A.
                    estado: activo
                    fechaCreacion: "2026-05-14T10:30:00Z"
        "400":
          description: Identificador de cliente inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                identificadorInvalido:
                  summary: Identificador inválido
                  value:
                    codigo: IDENTIFICADOR_INVALIDO
                    mensaje: El identificador del cliente no es válido.
                    detalles:
                      - clienteId no puede estar vacío.
        "404":
          description: Cliente inexistente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                clienteNoEncontrado:
                  summary: Cliente no encontrado
                  value:
                    codigo: CLIENTE_NO_ENCONTRADO
                    mensaje: No existe un cliente con el identificador indicado.
                    detalles:
                      - clienteId cli_999 no fue encontrado.

    delete:
      summary: Elimina un cliente
      description: Elimina un cliente específico por su identificador.
      operationId: eliminarCliente
      tags:
        - Clientes
      parameters:
        - name: clienteId
          in: path
          required: true
          description: Identificador único del cliente.
          schema:
            type: string
            minLength: 1
            maxLength: 64
            example: cli_001
      responses:
        "204":
          description: Cliente eliminado correctamente. La respuesta no incluye contenido.
        "400":
          description: Identificador de cliente inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                identificadorInvalido:
                  summary: Identificador inválido
                  value:
                    codigo: IDENTIFICADOR_INVALIDO
                    mensaje: El identificador del cliente no es válido.
                    detalles:
                      - clienteId no puede estar vacío.
        "404":
          description: Cliente inexistente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                clienteNoEncontrado:
                  summary: Cliente no encontrado
                  value:
                    codigo: CLIENTE_NO_ENCONTRADO
                    mensaje: No existe un cliente con el identificador indicado.
                    detalles:
                      - clienteId cli_999 no fue encontrado.

  /clientes/{clienteId}/contactos:
    get:
      summary: Lista contactos de un cliente
      description: Obtiene los contactos asociados a un cliente específico, manteniendo la jerarquía cliente-contactos.
      operationId: listarContactosDeCliente
      tags:
        - Contactos
      parameters:
        - name: clienteId
          in: path
          required: true
          description: Identificador único del cliente propietario de los contactos.
          schema:
            type: string
            minLength: 1
            maxLength: 64
            example: cli_001
      responses:
        "200":
          description: Lista de contactos obtenida correctamente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contacto"
              examples:
                contactos:
                  summary: Contactos de un cliente
                  value:
                    - id: con_001
                      clienteId: cli_001
                      nombre: Ana Rodríguez
                      email: ana.rodriguez@acme.com
                      cargo: Gerente de Compras
                      principal: true
                      fechaCreacion: "2026-05-14T11:00:00Z"
                    - id: con_002
                      clienteId: cli_001
                      nombre: Pablo Sánchez
                      email: pablo.sanchez@acme.com
                      cargo: Analista Comercial
                      principal: false
                      fechaCreacion: "2026-05-14T11:15:00Z"
        "400":
          description: Identificador de cliente inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                identificadorInvalido:
                  summary: Identificador inválido
                  value:
                    codigo: IDENTIFICADOR_INVALIDO
                    mensaje: El identificador del cliente no es válido.
                    detalles:
                      - clienteId no puede estar vacío.
        "404":
          description: Cliente inexistente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                clienteNoEncontrado:
                  summary: Cliente no encontrado
                  value:
                    codigo: CLIENTE_NO_ENCONTRADO
                    mensaje: No existe un cliente con el identificador indicado.
                    detalles:
                      - clienteId cli_999 no fue encontrado.

    post:
      summary: Crea un contacto de un cliente
      description: Crea un nuevo contacto asociado al cliente identificado por clienteId.
      operationId: crearContactoDeCliente
      tags:
        - Contactos
      parameters:
        - name: clienteId
          in: path
          required: true
          description: Identificador único del cliente propietario del contacto.
          schema:
            type: string
            minLength: 1
            maxLength: 64
            example: cli_001
      requestBody:
        required: true
        description: Datos necesarios para crear un contacto asociado al cliente.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactoInput"
            examples:
              nuevoContacto:
                summary: Nuevo contacto
                value:
                  nombre: Ana Rodríguez
                  email: ana.rodriguez@acme.com
                  cargo: Gerente de Compras
                  principal: true
      responses:
        "201":
          description: Contacto creado correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contacto"
              examples:
                contactoCreado:
                  summary: Contacto creado
                  value:
                    id: con_001
                    clienteId: cli_001
                    nombre: Ana Rodríguez
                    email: ana.rodriguez@acme.com
                    cargo: Gerente de Compras
                    principal: true
                    fechaCreacion: "2026-05-14T11:00:00Z"
        "400":
          description: Datos de entrada inválidos.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                datosInvalidos:
                  summary: Datos inválidos
                  value:
                    codigo: DATOS_INVALIDOS
                    mensaje: La solicitud contiene datos inválidos.
                    detalles:
                      - nombre es obligatorio.
                      - email debe tener formato de correo electrónico válido.
        "404":
          description: Cliente inexistente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                clienteNoEncontrado:
                  summary: Cliente no encontrado
                  value:
                    codigo: CLIENTE_NO_ENCONTRADO
                    mensaje: No existe un cliente con el identificador indicado.
                    detalles:
                      - clienteId cli_999 no fue encontrado.

  /clientes/{clienteId}/contactos/{contactoId}:
    get:
      summary: Obtiene un contacto de un cliente
      description: Obtiene el detalle de un contacto específico asociado a un cliente específico.
      operationId: obtenerContactoDeCliente
      tags:
        - Contactos
      parameters:
        - name: clienteId
          in: path
          required: true
          description: Identificador único del cliente propietario del contacto.
          schema:
            type: string
            minLength: 1
            maxLength: 64
            example: cli_001
        - name: contactoId
          in: path
          required: true
          description: Identificador único del contacto asociado al cliente.
          schema:
            type: string
            minLength: 1
            maxLength: 64
            example: con_001
      responses:
        "200":
          description: Contacto obtenido correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contacto"
              examples:
                contacto:
                  summary: Detalle de contacto
                  value:
                    id: con_001
                    clienteId: cli_001
                    nombre: Ana Rodríguez
                    email: ana.rodriguez@acme.com
                    cargo: Gerente de Compras
                    principal: true
                    fechaCreacion: "2026-05-14T11:00:00Z"
        "400":
          description: Identificador de cliente o contacto inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                identificadorInvalido:
                  summary: Identificador inválido
                  value:
                    codigo: IDENTIFICADOR_INVALIDO
                    mensaje: Uno o más identificadores no son válidos.
                    detalles:
                      - clienteId no puede estar vacío.
                      - contactoId no puede estar vacío.
        "404":
          description: Cliente o contacto inexistente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                contactoNoEncontrado:
                  summary: Contacto no encontrado
                  value:
                    codigo: CONTACTO_NO_ENCONTRADO
                    mensaje: No existe un contacto con el identificador indicado para el cliente solicitado.
                    detalles:
                      - clienteId cli_001 existe, pero contactoId con_999 no fue encontrado.

    delete:
      summary: Elimina un contacto de un cliente
      description: Elimina un contacto específico asociado a un cliente específico.
      operationId: eliminarContactoDeCliente
      tags:
        - Contactos
      parameters:
        - name: clienteId
          in: path
          required: true
          description: Identificador único del cliente propietario del contacto.
          schema:
            type: string
            minLength: 1
            maxLength: 64
            example: cli_001
        - name: contactoId
          in: path
          required: true
          description: Identificador único del contacto asociado al cliente.
          schema:
            type: string
            minLength: 1
            maxLength: 64
            example: con_001
      responses:
        "204":
          description: Contacto eliminado correctamente. La respuesta no incluye contenido.
        "400":
          description: Identificador de cliente o contacto inválido.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                identificadorInvalido:
                  summary: Identificador inválido
                  value:
                    codigo: IDENTIFICADOR_INVALIDO
                    mensaje: Uno o más identificadores no son válidos.
                    detalles:
                      - clienteId no puede estar vacío.
                      - contactoId no puede estar vacío.
        "404":
          description: Cliente o contacto inexistente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                contactoNoEncontrado:
                  summary: Contacto no encontrado
                  value:
                    codigo: CONTACTO_NO_ENCONTRADO
                    mensaje: No existe un contacto con el identificador indicado para el cliente solicitado.
                    detalles:
                      - clienteId cli_001 existe, pero contactoId con_999 no fue encontrado.

components:
  schemas:
    Cliente:
      type: object
      additionalProperties: false
      required:
        - id
        - nombre
        - email
        - estado
        - fechaCreacion
      properties:
        id:
          type: string
          description: Identificador único del cliente.
          readOnly: true
          minLength: 1
          maxLength: 64
          example: cli_001
        nombre:
          type: string
          description: Nombre completo del cliente.
          minLength: 1
          maxLength: 120
          example: Juan Pérez
        email:
          type: string
          description: Correo electrónico principal del cliente.
          format: email
          minLength: 5
          maxLength: 254
          example: juan.perez@acme.com
        telefono:
          type: string
          description: Teléfono de contacto del cliente.
          minLength: 6
          maxLength: 30
          example: "+5491123456789"
        empresa:
          type: string
          description: Empresa asociada al cliente.
          minLength: 1
          maxLength: 120
          example: Acme S.A.
        estado:
          type: string
          description: Estado comercial del cliente.
          enum:
            - activo
            - inactivo
            - prospecto
          example: activo
        fechaCreacion:
          type: string
          description: Fecha y hora de creación del cliente.
          format: date-time
          readOnly: true
          example: "2026-05-14T10:30:00Z"

    ClienteInput:
      type: object
      additionalProperties: false
      required:
        - nombre
        - email
        - estado
      properties:
        nombre:
          type: string
          description: Nombre completo del cliente.
          minLength: 1
          maxLength: 120
          example: Laura Fernández
        email:
          type: string
          description: Correo electrónico principal del cliente.
          format: email
          minLength: 5
          maxLength: 254
          example: laura.fernandez@orion.com
        telefono:
          type: string
          description: Teléfono de contacto del cliente.
          minLength: 6
          maxLength: 30
          example: "+5491155512345"
        empresa:
          type: string
          description: Empresa asociada al cliente.
          minLength: 1
          maxLength: 120
          example: Orion Consulting
        estado:
          type: string
          description: Estado comercial del cliente.
          enum:
            - activo
            - inactivo
            - prospecto
          example: prospecto

    Contacto:
      type: object
      additionalProperties: false
      required:
        - id
        - clienteId
        - nombre
        - email
        - principal
        - fechaCreacion
      properties:
        id:
          type: string
          description: Identificador único del contacto.
          readOnly: true
          minLength: 1
          maxLength: 64
          example: con_001
        clienteId:
          type: string
          description: Identificador único del cliente al que pertenece el contacto.
          readOnly: true
          minLength: 1
          maxLength: 64
          example: cli_001
        nombre:
          type: string
          description: Nombre completo del contacto.
          minLength: 1
          maxLength: 120
          example: Ana Rodríguez
        email:
          type: string
          description: Correo electrónico del contacto.
          format: email
          minLength: 5
          maxLength: 254
          example: ana.rodriguez@acme.com
        cargo:
          type: string
          description: Cargo o posición del contacto dentro de la empresa.
          minLength: 1
          maxLength: 100
          example: Gerente de Compras
        principal:
          type: boolean
          description: Indica si el contacto es el contacto principal del cliente.
          example: true
        fechaCreacion:
          type: string
          description: Fecha y hora de creación del contacto.
          format: date-time
          readOnly: true
          example: "2026-05-14T11:00:00Z"

    ContactoInput:
      type: object
      additionalProperties: false
      required:
        - nombre
        - email
        - principal
      properties:
        nombre:
          type: string
          description: Nombre completo del contacto.
          minLength: 1
          maxLength: 120
          example: Ana Rodríguez
        email:
          type: string
          description: Correo electrónico del contacto.
          format: email
          minLength: 5
          maxLength: 254
          example: ana.rodriguez@acme.com
        cargo:
          type: string
          description: Cargo o posición del contacto dentro de la empresa.
          minLength: 1
          maxLength: 100
          example: Gerente de Compras
        principal:
          type: boolean
          description: Indica si el contacto es el contacto principal del cliente.
          example: true

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - codigo
        - mensaje
      properties:
        codigo:
          type: string
          description: Código legible del error.
          minLength: 1
          maxLength: 80
          example: DATOS_INVALIDOS
        mensaje:
          type: string
          description: Mensaje descriptivo del error.
          minLength: 1
          maxLength: 255
          example: La solicitud contiene datos inválidos.
        detalles:
          type: array
          description: Lista opcional de detalles específicos del error.
          items:
            type: string
          example:
            - email debe tener formato de correo electrónico válido.